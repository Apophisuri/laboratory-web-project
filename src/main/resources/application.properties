spring.application.name=laboratoryweb

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.qvtu.laboratoryweb.entity

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/laboratory?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
